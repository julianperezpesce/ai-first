name: Update Changelog

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'dist/**'
      - 'package.json'

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Changelog
        id: changelog
        run: |
          # Get last tag and commits since
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD 2>/dev/null || git log --pretty=format:"- %s (%h)" -10)
          
          # Read current changelog
          CURRENT_CHANGELOG=$(cat CHANGELOG.md 2>/dev/null || echo "")
          
          # Create new entry using heredoc for proper multiline handling
          NEW_ENTRY=$(cat <<EOF
          ## [Unreleased]

          ### Added
          $COMMITS

          $CURRENT_CHANGELOG
          EOF
          )
          
          # Write back if different
          if ! echo "$CURRENT_CHANGELOG" | grep -q "$COMMITS"; then
            echo "$NEW_ENTRY" > CHANGELOG.md
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changelog
        if: steps.changelog.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "docs: Auto-update CHANGELOG" || echo "No changes to commit"

      - name: Push changes
        if: steps.changelog.outputs.changed == 'true'
        run: |
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
