<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Context Dashboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px}
  h1{color:#58a6ff;margin-bottom:10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;margin-top:15px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:15px}
  .card h2{font-size:14px;color:#58a6ff;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .card pre{background:#0d1117;border-radius:4px;padding:10px;font-size:12px;overflow-x:auto;max-height:300px}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px}
  .badge-ok{background:#238636;color:#fff}
  .badge-warn{background:#9e6a03;color:#fff}
  .badge-crit{background:#da3633;color:#fff}
  .stat{font-size:24px;font-weight:bold;color:#58a6ff}
  .stat-label{font-size:11px;color:#8b949e}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row .card{flex:1;min-width:150px}
</style>
</head>
<body>
<h1>🧠 AI Context Dashboard</h1>
<div class="row" id="stats"></div>
<div class="grid" id="cards"></div>
<script>
fetch('ai_context.md').then(r=>r.text()).then(md=>{
  const sections=md.split('---').filter(Boolean);
  document.getElementById('cards').innerHTML=sections.map(s=>{
    const title=s.match(/## (.*)/)?.[1]||'';
    const clean=s.replace(/^##.*\n?/gm,'').trim();
    return `<div class="card"><h2>${title}</h2><pre>${escapeHtml(clean.slice(0,500))}</pre></div>`;
  }).join('');
});
fetch('symbols.json').then(r=>r.json()).then(d=>{
  document.getElementById('stats').innerHTML=`
    <div class="card"><div class="stat">${d.symbols?.length||0}</div><div class="stat-label">Symbols</div></div>
    <div class="card"><div class="stat">${d.statistics?.totalFiles||0}</div><div class="stat-label">Files</div></div>
  `;
});
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
