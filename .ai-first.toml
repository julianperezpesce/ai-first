# AI-First Configuration (TOML)
# Generated by ai-first-cli v1.5.0
# Docs: https://github.com/julianperezpesce/ai-first

[output]
directory = "ai-context"

[preset]
name = "full"  # full | quick | api | docs

[exclude]
patterns = ["node_modules", ".git", "dist", "build"]

[include]
extensions = [".ts", ".js", ".py", ".go", ".rs", ".java", ".rb", ".php"]

[features]
security = true
performance = true
models = true
cross_cutting = true
dead_code = false

[search]
# max_results = 10
# context_lines = 5
