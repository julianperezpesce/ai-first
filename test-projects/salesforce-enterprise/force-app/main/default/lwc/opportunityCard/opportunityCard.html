<template>
    <lightning-card class="opportunity-card" icon-name="standard:opportunity">
        <div slot="title">
            <span class="opportunity-name">{name}</span>
            <span class={stageColor}>{stage}</span>
        </div>
        
        <div class="slds-p-around_medium">
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                    <div class="info-label">Account</div>
                    <div class="info-value">{accountName}</div>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <div class="info-label">Amount</div>
                    <div class="info-value amount">{formattedAmount}</div>
                </div>
            </div>
            
            <div class="slds-grid slds-gutters slds-m-top_small">
                <div class="slds-col slds-size_1-of-2">
                    <div class="info-label">Close Date</div>
                    <div class={urgencyClass}>
                        <lightning-icon icon-name="utility:event" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        {formattedCloseDate}
                        <template if:true={daysUntilClose}>
                            ({daysUntilClose} days)
                        </template>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <div class="info-label">Days Until Close</div>
                    <div class={urgencyClass}>{daysUntilClose}</div>
                </div>
            </div>
        </div>

        <div slot="footer">
            <lightning-button-group>
                <lightning-button label="View" onclick={handleViewRecord}></lightning-button>
                <lightning-button label="Edit" onclick={handleEditRecord}></lightning-button>
            </lightning-button-group>
        </div>
    </lightning-card>
</template>
