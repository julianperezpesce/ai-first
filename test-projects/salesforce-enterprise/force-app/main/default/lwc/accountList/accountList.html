<template>
    <lightning-card title="Account List" icon-name="standard:account">
        <div slot="actions">
            <lightning-button label="Refresh" icon-name="utility:refresh" 
                            onclick={handleRefresh}></lightning-button>
        </div>
        
        <div class="slds-p-around_medium">
            <lightning-layout multiple-rows="true" vertical-align="center">
                <lightning-layout-item size="6" padding="around_small">
                    <lightning-input 
                        type="search" 
                        label="Search Accounts" 
                        value={searchTerm}
                        onchange={handleSearchTermChange}
                        placeholder="Search by account name...">
                    </lightning-input>
                </lightning-layout-item>
                
                <lightning-layout-item size="4" padding="around_small">
                    <lightning-combobox
                        label="Industry"
                        value={industryFilter}
                        options={industries}
                        onchange={handleIndustryChange}>
                    </lightning-combobox>
                </lightning-layout-item>
            </lightning-layout>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:true={hasAccounts}>
            <div class="slds-p-around_small">
                <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th scope="col">
                                <div class="slds-truncate" title="Account Name">Account Name</div>
                            </th>
                            <th scope="col">
                                <div class="slds-truncate" title="Industry">Industry</div>
                            </th>
                            <th scope="col">
                                <div class="slds-truncate" title="Annual Revenue">Annual Revenue</div>
                            </th>
                            <th scope="col">
                                <div class="slds-truncate" title="Employees">Employees</div>
                            </th>
                            <th scope="col">
                                <div class="slds-truncate" title="Location">Location</div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={filteredAccounts} for:item="account">
                            <tr key={account.Id} class="slds-hint-parent">
                                <th scope="row">
                                    <div class="slds-truncate">
                                        <a data-id={account.Id} onclick={handleAccountClick}>
                                            {account.Name}
                                        </a>
                                    </div>
                                </th>
                                <td>
                                    <div class="slds-truncate">{account.Industry}</div>
                                </td>
                                <td>
                                    <div class="slds-truncate">
                                        <lightning-formatted-number 
                                            value={account.AnnualRevenue} 
                                            format-style="currency"
                                            currency-code="USD">
                                        </lightning-formatted-number>
                                    </div>
                                </td>
                                <td>
                                    <div class="slds-truncate">
                                        <lightning-formatted-number value={account.NumberOfEmployees}>
                                        </lightning-formatted-number>
                                    </div>
                                </td>
                                <td>
                                    <div class="slds-truncate">
                                        {account.BillingCity}, {account.BillingState}
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <template if:false={hasAccounts}>
            <div class="slds-p-around_large slds-align_absolute-center">
                <p class="slds-text-color_weak">No accounts found matching your criteria.</p>
            </div>
        </template>
    </lightning-card>
</template>
